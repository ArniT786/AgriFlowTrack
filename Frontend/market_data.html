<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriFlowTrack - Market Data</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <h2>AgriFlowTrack</h2>
        <ul class="nav-links">
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="agricultural_products.html">Agricultural Products</a></li>
            <li><a href="agri_inputs.html">Agri Inputs</a></li>
            <li><a href="perishable_products.html">Perishable Products</a></li>
            <li><a href="post_harvest_monitor.html">Post-Harvest Monitor</a></li>
            <li><a href="storage_conditions.html">Storage Conditions</a></li>
            <li><a href="harvested_crops.html">Harvested Crops</a></li>
            <li><a href="tracking_of_products.html">Tracking of Products</a></li>
            <li class="active"><a href="market_data.html">Market Data</a></li>
            <li><a href="inventory.html">Inventory</a></li>
        </ul>
        <div class="logout-container">
            <button class="logout-btn">Logout</button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="header-row">
            <h1>Market Data</h1>
            <div class="header-actions">
                <input type="text" id="search-input" class="search-input" placeholder="Search in table...">
                <button class="btn btn-refresh" onclick="loadData()">Refresh</button>
            </div>
        </div>

        <div class="card">
            <h2 class="card-title">Create / Edit</h2>
            <form id="data-form">
                <input type="hidden" id="id" name="id">

                <div class="form-grid">
                    <div class="form-group">
                        <label for="market">Market</label>
                        <input type="text" id="market" name="market" placeholder="e.g. Nairobi Wakulima" required>
                    </div>
                    <div class="form-group">
                        <label for="product">Product</label>
                        <input type="text" id="product" name="product" placeholder="e.g. Tomato" required>
                    </div>
                    <div class="form-group">
                        <label for="price_per_unit">Price / Unit ($)</label>
                        <input type="number" step="0.01" id="price_per_unit" name="price_per_unit"
                            placeholder="e.g. 1.30" required>
                    </div>
                    <div class="form-group">
                        <label for="date">Date</label>
                        <input type="date" id="date" name="date">
                    </div>
                </div>

                <div class="form-actions" style="margin-top: 20px;">
                    <button type="submit" class="btn btn-primary">Save</button>
                    <button type="reset" class="btn btn-secondary"
                        onclick="document.getElementById('id').value=''">Reset</button>
                </div>
            </form>
        </div>

        <div class="card">
            <div class="table-responsive">
                <table id="data-table-container">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Market</th>
                            <th>Product</th>
                            <th>Price / Unit ($)</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="data-table">
                        <!-- Data injected by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script src="js/market_data.js"></script>
</body>

</html>
