<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriFlowTrack - Harvested Crops</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <h2>AgriFlowTrack</h2>
        <ul class="nav-links">
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="agricultural_products.html">Agricultural Products</a></li>
            <li><a href="agri_inputs.html">Agri Inputs</a></li>
            <li><a href="perishable_products.html">Perishable Products</a></li>
            <li><a href="post_harvest_monitor.html">Post-Harvest Monitor</a></li>
            <li><a href="storage_conditions.html">Storage Conditions</a></li>
            <li class="active"><a href="harvested_crops.html">Harvested Crops</a></li>
            <li><a href="tracking_of_products.html">Tracking of Products</a></li>
            <li><a href="market_data.html">Market Data</a></li>
            <li><a href="inventory.html">Inventory</a></li>
        </ul>
        <div class="logout-container">
            <button class="logout-btn">Logout</button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="header-row">
            <h1>Harvested Crops</h1>
            <div class="header-actions">
                <input type="text" id="search-input" class="search-input" placeholder="Search in table...">
                <button class="btn btn-refresh" onclick="loadData()">Refresh</button>
            </div>
        </div>

        <div class="card">
            <h2 class="card-title">Create / Edit</h2>
            <form id="data-form">
                <input type="hidden" id="id" name="id">

                <div class="form-grid">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" placeholder="e.g. Tomato Lot A (Morning)" required>
                    </div>
                    <div class="form-group">
                        <label for="quantity">Quantity (kg)</label>
                        <input type="number" step="0.01" id="quantity" name="quantity" placeholder="e.g. 500.00"
                            required>
                    </div>
                    <div class="form-group">
                        <label for="storage_condition">Storage Condition</label>
                        <input type="text" id="storage_condition" name="storage_condition"
                            placeholder="e.g. 2-1°C refrigerated">
                    </div>
                    <div class="form-group">
                        <label for="movement_details">Movement Details</label>
                        <input type="text" id="movement_details" name="movement_details"
                            placeholder="e.g. To Packaging Tuesday 08:00">
                    </div>
                </div>

                <div class="form-grid">
                    <div class="form-group" style="max-width: 250px;">
                        <label for="expiry_date">Expiry Date</label>
                        <input type="date" id="expiry_date" name="expiry_date">
                    </div>

                    <div class="form-actions" style="margin-top: 24px; display: flex; align-items: flex-start;">
                        <button type="submit" class="btn btn-primary">Save</button>
                        <button type="reset" class="btn btn-secondary"
                            onclick="document.getElementById('id').value=''">Reset</button>
                    </div>
                </div>
            </form>
        </div>

        <div class="card">
            <div class="table-responsive">
                <table id="data-table-container">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Qty (kg)</th>
                            <th>Storage</th>
                            <th>Movement</th>
                            <th>Expiry</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="data-table">
                        <!-- Data injected by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script src="js/harvested_crops.js"></script>
</body>

</html>
